<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Громов Олег Николаевич</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b12;
    --surface: #0e1220;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --teal: #38c8c0;
    --text: #e8e4dc;
    --muted: #7a8090;
    --border: rgba(201,168,76,0.18);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── animated background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(56,200,192,.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(201,168,76,.07) 0%, transparent 70%);
    animation: breathe 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes breathe {
    from { opacity: .6; transform: scale(1); }
    to   { opacity: 1;  transform: scale(1.06); }
  }

  /* grid noise texture */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── card wrapper ── */
  .scene {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    position: relative;
    width: min(480px, 100%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem 2.5rem;
    overflow: hidden;
    animation: cardIn .9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(32px) scale(.97); }
    to   { opacity:1; transform: translateY(0)    scale(1); }
  }

  /* corner glow lines */
  .card::before, .card::after {
    content: '';
    position: absolute;
    border-radius: inherit;
    pointer-events: none;
  }
  .card::before {
    inset: -1px;
    background: linear-gradient(135deg, rgba(201,168,76,.4) 0%, transparent 40%, transparent 60%, rgba(56,200,192,.3) 100%);
    z-index: 0;
    border-radius: 20px;
    mask: linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);
    mask-composite: exclude;
    -webkit-mask-composite: xor;
    padding: 1px;
  }
  .card::after {
    inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(201,168,76,.06) 0%, transparent 70%);
    z-index: 0;
  }

  .card > * { position: relative; z-index: 1; }

  /* ── monogram / avatar ring ── */
  .avatar {
    width: 90px; height: 90px;
    margin: 0 auto 1.8rem;
    position: relative;
  }
  .avatar-ring {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: conic-gradient(var(--gold), var(--teal), var(--gold));
    display: flex; align-items: center; justify-content: center;
    animation: spin 12s linear infinite;
    box-shadow: 0 0 28px rgba(201,168,76,.25);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-inner {
    width: 78px; height: 78px;
    border-radius: 50%;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    /* keep bg for the circle behind */
    position: relative;
  }
  .avatar-inner::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: var(--surface);
    z-index: -1;
  }

  /* ── name ── */
  .name {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 600;
    letter-spacing: .04em;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite, fadeUp .8s .2s both;
    text-shadow: none;
    filter: drop-shadow(0 0 22px rgba(201,168,76,.4));
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── divider ── */
  .divider {
    display: flex; align-items: center; gap: .8rem;
    margin: 1.2rem 0 1rem;
    animation: fadeUp .8s .35s both;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: .4;
  }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: .7;
  }

  /* ── specialization ── */
  .spec {
    text-align: center;
    font-size: .78rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--teal);
    opacity: .85;
    animation: fadeUp .8s .45s both;
  }

  /* ── tags ── */
  .tags {
    display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem;
    margin: 1.6rem 0;
    animation: fadeUp .8s .55s both;
  }
  .tag {
    padding: .3rem .85rem;
    border: 1px solid rgba(201,168,76,.25);
    border-radius: 50px;
    font-size: .72rem;
    letter-spacing: .1em;
    color: var(--gold);
    background: rgba(201,168,76,.05);
    text-transform: uppercase;
  }

  /* ── social icons ── */
  .socials {
    display: flex; justify-content: center; gap: 1.1rem;
    margin: 1.6rem 0;
    animation: fadeUp .8s .65s both;
  }
  .social-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    text-decoration: none;
    transition: transform .25s, border-color .25s, background .25s, box-shadow .25s;
    position: relative;
    overflow: hidden;
  }
  .social-btn::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 50% 0%, rgba(201,168,76,.18), transparent 70%);
    opacity: 0;
    transition: opacity .25s;
  }
  .social-btn:hover::before { opacity: 1; }
  .social-btn:hover {
    transform: translateY(-4px) scale(1.08);
    border-color: rgba(201,168,76,.55);
    box-shadow: 0 8px 28px rgba(201,168,76,.18), 0 0 0 1px rgba(201,168,76,.12);
  }
  .social-btn svg {
    width: 20px; height: 20px;
    fill: var(--muted);
    transition: fill .25s;
  }
  .social-btn:hover svg { fill: var(--gold2); }

  /* ── CTA button ── */
  .cta-wrap {
    display: flex; justify-content: center;
    margin-top: 1.8rem;
    animation: fadeUp .8s .75s both;
  }
  .cta {
    position: relative;
    display: inline-flex; align-items: center; gap: .6rem;
    padding: .85rem 2.2rem;
    border-radius: 50px;
    text-decoration: none;
    font-size: .8rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--bg);
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    background-size: 200% auto;
    transition: background-position .5s, transform .25s, box-shadow .25s;
    box-shadow: 0 4px 24px rgba(201,168,76,.3), 0 0 0 0 rgba(201,168,76,.4);
    overflow: hidden;
  }
  .cta::after {
    content: '';
    position: absolute; inset: 0; border-radius: inherit;
    background: rgba(255,255,255,.12);
    opacity: 0;
    transition: opacity .2s;
  }
  .cta:hover::after { opacity: 1; }
  .cta:hover {
    background-position: right center;
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 36px rgba(201,168,76,.45), 0 0 0 3px rgba(201,168,76,.15);
  }
  .cta:active { transform: scale(.98); }
  .cta svg { width: 16px; height: 16px; fill: var(--bg); flex-shrink: 0; }
  /* pulse ring */
  .cta-pulse {
    position: absolute; inset: 0; border-radius: inherit;
    border: 2px solid rgba(201,168,76,.55);
    animation: pulse 2.4s ease-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: .7; }
    70%  { transform: scale(1.1); opacity: 0; }
    100% { transform: scale(1.1); opacity: 0; }
  }

  /* ── footer note ── */
  .footer-note {
    text-align: center;
    font-size: .68rem;
    letter-spacing: .1em;
    color: var(--muted);
    margin-top: 2rem;
    opacity: .6;
    animation: fadeUp .8s .85s both;
  }
</style>
</head>
